<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Download Styles</title>
</head>
<body style="font:16px monospace;padding:40px;background:#111;color:#0f0">
    <h2>Computed Styles Download</h2>
    <p id="status">Checking storage...</p>
    <p id="meta" style="color:#9ae6b4;margin:10px 0 18px 0;"></p>
    <textarea id="output" style="width:100%;height:420px;background:#222;color:#0f0;font:13px monospace;display:none;border:1px solid #333;padding:10px"></textarea>
    <br><br>
    <button id="copyBtn" style="padding:12px 24px;font-size:16px;cursor:pointer;display:none;background:#22c55e;color:#fff;border:none;border-radius:6px;margin-right:10px">Copy JSON</button>
    <button id="downloadBtn" style="padding:12px 24px;font-size:16px;cursor:pointer;display:none;background:#2563eb;color:#fff;border:none;border-radius:6px">Download JSON</button>

    <script>
        var status = document.getElementById('status');
        var meta = document.getElementById('meta');
        var output = document.getElementById('output');
        var copyBtn = document.getElementById('copyBtn');
        var downloadBtn = document.getElementById('downloadBtn');
        var jsonText = null;

        function setData(data, source) {
            if (!data) return false;
            jsonText = data;
            output.style.display = 'block';
            output.value = data;
            copyBtn.style.display = 'inline-block';
            downloadBtn.style.display = 'inline-block';
            status.textContent = 'Found JSON from ' + source + ': ' + data.length + ' chars';

            try {
                var parsed = JSON.parse(data);
                if (parsed && parsed.meta) {
                    meta.textContent =
                        'XPath: ' + (parsed.meta.xpath || '-') +
                        ' | Elements: ' + (parsed.meta.totalElements || 0) +
                        ' | Interactive rules: ' + (parsed.meta.totalInteractiveRules || 0) +
                        ' | Keyframes: ' + (parsed.meta.totalKeyframes || 0);
                }
            } catch (e) {
                meta.textContent = 'Warning: JSON parse failed, raw text is shown.';
            }
            return true;
        }

        function tryReadWindowName() {
            if (!window.name || window.name.indexOf('__computed_styles__:') !== 0) return null;
            return window.name.substring('__computed_styles__:'.length);
        }

        function tryReadOpener() {
            try {
                if (window.opener && window.opener.__computedStylesOutput) {
                    return JSON.stringify(window.opener.__computedStylesOutput, null, 2);
                }
            } catch (e) {}
            return null;
        }

        var found =
            setData(localStorage.getItem('computed-styles'), 'localStorage') ||
            setData(sessionStorage.getItem('computed-styles'), 'sessionStorage') ||
            setData(tryReadWindowName(), 'window.name') ||
            setData(tryReadOpener(), 'window.opener');

        if (!found) {
            status.textContent = 'No data found. Open extract page first, wait for green badge, then click Download JSON on that page.';
            meta.textContent = 'Tip: large extracts can exceed localStorage quota.';
        }

        copyBtn.onclick = function () {
            output.select();
            document.execCommand('copy');
            var old = copyBtn.textContent;
            copyBtn.textContent = 'Copied';
            setTimeout(function () { copyBtn.textContent = old; }, 1500);
        };

        downloadBtn.onclick = function () {
            if (!jsonText) return;
            var blob = new Blob([jsonText], { type: 'application/json;charset=utf-8' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = 'computed-styles.json';
            document.body.appendChild(a);
            a.click();
            a.remove();
            setTimeout(function () { URL.revokeObjectURL(url); }, 1200);
        };
    </script>
</body>
</html>
